# Workflow derived from https://github.com/r-lib/actions/tree/master/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches-ignore:
      - 'main'

name: render-and-document

jobs:
  render-and-document:
    name: render-and-document
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_PAT: ${{ secrets.OA_PAT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.OA_PAT }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pak, any::remotes, any::stringr, any::devtools, any::rmarkdown, any::roxygen2, local::.

      - name: Render Rmarkdown files
        run: |
          RMD_PATH=($(find . -iname "*.rmd" | grep -v vignette || echo "No Rmd found"))
          Rscript -e 'for (f in commandArgs(TRUE)) if (file.exists(f)) rmarkdown::render(f)' ${RMD_PATH[*]}

      - name: Commit results
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add -A
          git commit -m 'Re-build Rmarkdown files' || echo "No changes to commit"

      - name: Document
        run: |
          old_warn <- getOption("warn")
          options(warn = 2)
          on.exit(options(warn = old_warn), add = TRUE)

          tryCatch(
            {
              roxygen2::roxygenise(package.dir = ".")
            },
            error = function(e) {
              message("Roxygen2 documentation failed: ", conditionMessage(e))
              quit(status = 1)
            }
          )
        shell: Rscript {0}

      - name: Commit results
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add man/\* NAMESPACE
          git commit -am 'Document' || echo "No changes to commit"

      - name: Pull first
        run: |
          git pull

      - name: Push
        run: |
          git push origin
